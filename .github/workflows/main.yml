name: Java CI con Maven y Pruebas API (CELS Project)

on:
  push:
    branches: [ "master", "main", "tests" ]
  pull_request:
    branches: [ "master", "main", "tests" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dino0899
          MYSQL_DATABASE: cels
        # Usamos el puerto estándar de MySQL en la nube para evitar bloqueos de red
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # SIMULACIÓN INTELLIJ: Cambiamos tu configuración local a la configuración de nube
      - name: Traducir URL de BD para la nube
        run: |
          echo "Adaptando persistence.xml (Cambiando localhost:3307 a 127.0.0.1:3306)..."
          find . -name "persistence.xml" -exec sed -i 's/localhost:3307/127.0.0.1:3306/g' {} \;
          
          echo "=== ASÍ QUEDÓ TU ARCHIVO (Verifica que no esté roto) ==="
          find . -name "persistence.xml" -exec cat {} \;

      # SIMULACIÓN INTELLIJ: Botón "Build Project" (Empaquetar Multi-Módulo)
      - name: Build with Maven
        run: mvn -B install --file pom.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman y Playwright
        run: |
          npm install -g newman
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      # SIMULACIÓN INTELLIJ: Configurar el Servidor Local Tomcat
      - name: Descargar y preparar Tomcat
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-11/v11.0.8/bin/apache-tomcat-11.0.8.tar.gz
          tar xzvf apache-tomcat-11.0.8.tar.gz
          mv apache-tomcat-11.0.8 tomcat
          
          # Inyectar el Driver directamente al corazón de Tomcat para evitar el error [null]
          wget https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar -P tomcat/lib/
          
          # Relajar la seguridad para Postman
          sed -i 's/<Connector port="8080"/<Connector port="8080" relaxedPathChars="[]|{}" relaxedQueryChars="[]|{}" /g' tomcat/conf/server.xml
          
          # Mover tu proyecto al servidor
          find . -name "*.war" -exec cp {} tomcat/webapps/vista_war_exploded.war \;
          chmod +x tomcat/bin/*.sh

      # SIMULACIÓN INTELLIJ: Botón de "Play" verde en Tomcat
      - name: Iniciar Tomcat y BD
        run: |
          echo "Dando 20 segundos para que MySQL inicie sus tablas internas..."
          sleep 20
          
          echo "Iniciando Tomcat..."
          export JAVA_OPTS="-Djava.net.preferIPv4Stack=true"
          ./tomcat/bin/startup.sh
          
          echo "Tomcat corriendo. Esperando 40 segundos para despliegue de Hibernate..."
          sleep 40

      # SIMULACIÓN INTELLIJ: Ejecutar tus pruebas
      - name: Correr Pruebas de API con Newman
        run: newman run ./test/Pruebas_CELS.postman_collection.json

      - name: Correr Pruebas de UI con Playwright
        run: npx playwright test ./vista/src/test/java/ui/cels.spec.js

      - name: Mostrar consola de Tomcat
        if: always()
        run: cat tomcat/logs/catalina.out

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CELS-Build-Artifacts
          path: '**/*.war'