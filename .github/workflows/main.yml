name: Java CI con Maven y Pruebas API (CELS Project)

on:
  push:
    branches: [ "master", "main", "tests" ]
  pull_request:
    branches: [ "master", "main", "tests" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dino0899
          MYSQL_DATABASE: cels
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 1. Compilar el proyecto (Esto genera el archivo .war en la carpeta /target)
      - name: Build with Maven
        run: mvn -B install --file pom.xml

      # 2. Correr pruebas unitarias de Java (si tienes alguna)
      - name: Run Tests
        run: mvn test

      # 3. Preparar el entorno para Newman (Postman CLI)
      - name: Setup Node.js (Para Newman)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman
        run: npm install -g newman

      - name: Auditar archivo de conexión a BD
        continue-on-error: true
        run: |
          echo "=== Buscando y mostrando hibernate.cfg.xml o persistence.xml ==="

          find . -name "hibernate.cfg.xml" -exec cat {} \;
          find . -name "persistence.xml" -exec cat {} \;

      - name: Auditar servicio MySQL
        run: |
          echo "=== Contenedores activos ==="
          docker ps

      - name: Probar puerto 3307
        run: |
          echo "=== Intentando hacer ping al puerto 3307 (el que usa tu persistence) ==="
          sudo apt-get update && sudo apt-get install -y netcat-openbsd
          nc -zv 127.0.0.1 3307
      # 4. Descargar e iniciar Tomcat 11 (La misma versión que usas localmente)
      - name: Descargar y preparar Tomcat
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-11/v11.0.8/bin/apache-tomcat-11.0.8.tar.gz
          tar xzvf apache-tomcat-11.0.8.tar.gz
          mv apache-tomcat-11.0.8 tomcat
          
          # Copiamos el WAR a webapps
          find . -name "*.war" -exec cp {} tomcat/webapps/vista_war_exploded.war \;
          
          # Damos permisos pero NO ejecutamos startup.sh todavía
          chmod +x tomcat/bin/*.sh

      # 5. Esperar a MySQL e iniciar Tomcat una sola vez
      - name: Iniciar servicios
        run: |
          echo "Esperando a MySQL en el puerto 3307..."
          until nc -zv 127.0.0.1 3307; do
            echo "MySQL aún no responde, esperando..."
            sleep 2
          done
          
          echo "MySQL está arriba. Iniciando Tomcat por única vez..."
          ./tomcat/bin/startup.sh
          
          echo "Esperando a que la aplicación despliegue e Hibernate cree las tablas..."
          sleep 40

      # 6. Ejecutar las pruebas de Postman yes
      # Asegúrate de que la ruta coincida con la carpeta donde guardaste tu JSON en el repo
      - name: Correr Pruebas de API con Newman
        run: newman run ./test/Pruebas_CELS.postman_collection.json

      - name: Mostrar consola de Tomcat
        if: always()
        run: cat tomcat/logs/catalina.out

      # 7. Subir el artefacto compilado
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CELS-Build-Artifacts
          path: '**/*.war'