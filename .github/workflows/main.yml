name: Java CI con Maven y Pruebas API (CELS Project)

on:
  push:
    branches: [ "master", "main", "tests" ]
  pull_request:
    branches: [ "master", "main", "tests" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dino0899
          MYSQL_DATABASE: cels
        ports:
          - 3306:3306
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Corregir persistence.xml (Sin romper el usuario)
        run: |
          find . -name "persistence.xml" -exec sed -i 's/localhost/127.0.0.1/g' {} \;
          find . -name "persistence.xml" -exec sed -i 's/password" value="root"/password" value="dino0899"/g' {} \;
          find . -name "persistence.xml" -exec sed -i 's/useSSL=false/useSSL=false\&amp;allowPublicKeyRetrieval=true/g' {} \;
          find . -name "persistence.xml" -exec sed -i 's/value="none"/value="update"/g' {} \;

      - name: Build with Maven
        run: mvn -B install --file pom.xml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Unit Tests
        run: mvn test

      - name: Instalar Newman, Playwright y Reportes
        run: |
          npm install -g newman newman-reporter-htmlextra
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Descargar y preparar Tomcat
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-11/v11.0.8/bin/apache-tomcat-11.0.8.tar.gz
          tar xzvf apache-tomcat-11.0.8.tar.gz
          mv apache-tomcat-11.0.8 tomcat
          
          sed -i 's/<Connector port="8080"/<Connector port="8080" relaxedPathChars="[]|{}" relaxedQueryChars="[]|{}" /g' tomcat/conf/server.xml
          
          find . -name "*.war" -exec cp {} tomcat/webapps/vista_war_exploded.war \;
          chmod +x tomcat/bin/*.sh

      - name: Iniciar Tomcat y Poblar BD
        run: |
          echo "Iniciando Tomcat..."
          export JAVA_OPTS="-Djava.net.preferIPv4Stack=true"
          ./tomcat/bin/startup.sh
          
          echo "Esperando 40 segundos para que Hibernate cree las tablas vacías..."
          sleep 40
          
          echo "Inyectando usuarios y datos de prueba a MySQL..."
          mysql -h 127.0.0.1 -P 3306 -u root -pdino0899 cels < ./BD_Script/CELS.sql

      - name: Correr Pruebas de API con Newman
        run: |
          mkdir -p reportes-api
          newman run ./test/Pruebas_CELS.postman_collection.json -r cli,htmlextra --reporter-htmlextra-export reportes-api/reporte-api.html

      - name: Correr Pruebas de UI con Playwright
        if: always()
        run: npx playwright test ./vista/src/test/java/ui/cels.spec.js --reporter=html

      - name: Mostrar consola de Tomcat
        if: always()
        run: cat tomcat/logs/catalina.out

      # --- AQUÍ ESTÁ EL PASO QUE PEDISTE ---
      - name: Build Reportes (Consolidar en carpeta build)
        if: always()
        run: |
          mkdir -p build/reporte_api
          mkdir -p build/reporte_ui
          
          # Copiamos los reportes a la carpeta final de build
          # El "|| true" evita que el workflow falle si alguna prueba colapsó antes de generar el reporte
          cp -r reportes-api/* build/reporte_api/ || true
          cp -r playwright-report/* build/reporte_ui/ || true

      # --- SECCIÓN DE DESCARGA DE ARTEFACTOS aa---
      - name: Subir Artefacto WAR
        uses: actions/upload-artifact@v4
        with:
          name: CELS-Build-Artifacts
          path: '**/*.war'

      - name: Subir Consolidado de Reportes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Reportes-HTML-CELS
          path: build/