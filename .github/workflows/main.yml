name: Java CI con Maven y Pruebas API (CELS Project)

on:
  push:
    branches: [ "master", "main", "tests" ]
  pull_request:
    branches: [ "master", "main", "tests" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: dino0899
          MYSQL_DATABASE: cels
        # AQUÍ ESTÁ LA MAGIA: Tu persistence busca el 3307, GitHub lo redirige al 3306 interno.
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 1. Compilar el proyecto
      - name: Build with Maven
        run: mvn -B install --file pom.xml

      - name: Inspeccionar el WAR generado
        continue-on-error: true
        run: |
          echo "=== 1. ¿Qué URL quedó guardada exactamente dentro del WAR? ==="
          unzip -p target/*.war WEB-INF/classes/META-INF/persistence.xml | grep "jakarta.persistence.jdbc.url"
          
          echo "=== 2. ¿Maven empacó el Driver de MySQL en las librerías? ==="
          unzip -l target/*.war | grep mysql

      # 2. Correr pruebas unitarias de Java
      - name: Run Tests
        run: mvn test

      # 3. Preparar el entorno para Newman y Playwright
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Newman y Playwright
        run: |
          npm install -g newman
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      # 4. Descargar y preparar Tomcat
      - name: Descargar y preparar Tomcat
        run: |
          wget https://archive.apache.org/dist/tomcat/tomcat-11/v11.0.8/bin/apache-tomcat-11.0.8.tar.gz
          tar xzvf apache-tomcat-11.0.8.tar.gz
          mv apache-tomcat-11.0.8 tomcat
          
          # TRUCO 1: Descargar el Driver de MySQL a la carpeta lib
          wget https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/8.0.33/mysql-connector-j-8.0.33.jar -P tomcat/lib/
          
          # TRUCO 2: Permitir caracteres especiales en las properties
          echo 'org.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH=true' >> tomcat/conf/catalina.properties
          echo 'org.apache.catalina.connector.CoyoteAdapter.ALLOW_BACKSLASH=true' >> tomcat/conf/catalina.properties
          
          # Copiar el WAR y dar permisos
          find . -name "*.war" -exec cp {} tomcat/webapps/vista_war_exploded.war \;
          chmod +x tomcat/bin/*.sh

      # 5. Esperar a MySQL e iniciar Tomcat una sola vez
      - name: Iniciar servicios
        run: |
          echo "Esperando a MySQL en el puerto 3307..."
          until nc -zv 127.0.0.1 3307; do
            echo "MySQL aún no responde, esperando..."
            sleep 2
          done
          
          echo "MySQL está arriba. Iniciando Tomcat por única vez..."
          
          # Forzamos a Java/Tomcat a no usar redes IPv6
          export JAVA_OPTS="-Djava.net.preferIPv4Stack=true"
          ./tomcat/bin/startup.sh
          
          echo "Esperando a que la aplicación despliegue e Hibernate cree las tablas (40 seg)..."
          sleep 40

      # 6. Ejecutar las pruebas de API (Postman)
      - name: Correr Pruebas de API con Newman
        run: newman run ./test/Pruebas_CELS.postman_collection.json

      # 7. Ejecutar las pruebas de Interfaz de Usuario (Playwright)
      - name: Correr Pruebas de UI con Playwright
        # Ojo: Asegúrate de que la ruta coincida con donde tienes tu cels.spec.js
        run: npx playwright test ./vista/src/test/java/ui/cels.spec.js

      - name: Mostrar consola de Tomcat (Útil si algo falla)
        if: always()
        run: cat tomcat/logs/catalina.out

      # 8. Subir el artefacto compilado
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CELS-Build-Artifacts
          path: '**/*.war'