name: Java CI con Maven (CELS Project)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Configuramos MySQL como un servicio para que las pruebas de persistencia funcionen
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: desarrollo
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # Ejecuta la limpieza, compilación e instalación de todos los módulos (Entidad, Negocio, Persistencia, Vista)
      run: mvn -B install --file pom.xml

    - name: Run Tests
      # Ejecuta las pruebas unitarias y de integración
      run: mvn test

    - name: Upload Artifact
      # Guarda el archivo .war o .jar resultante para que puedas descargarlo desde GitHub
      uses: actions/upload-artifact@v4
      with:
        name: CELS-Package
        path: "**/target/*.v*ar" # Captura .war o .jar según tu configuración de empaquetado
